version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      laravel:
        patterns:
          - "laravel/*"
      dev-dependencies:
        dependency-type: "development"
    labels:
      - "dependencies"
      - "php"
